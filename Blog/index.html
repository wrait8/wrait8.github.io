<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WRAITH · Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0c0e;
            min-height: 100vh;
            font-family: 'Space Grotesk', sans-serif;
            color: #f0f5f5;
            overflow-x: hidden;
        }

        .page-wrapper {
            position: relative;
            min-height: 100vh;
            background: #0d0f12;
            overflow: hidden;
        }

        .page-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('../Images/bg colors effect.png') center/cover no-repeat;
            opacity: 0.5;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 0;
        }

        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(200, 200, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 255, 255, 0.04) 0%, transparent 40%);
            pointer-events: none;
        }

        .page-wrapper::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
            backdrop-filter: blur(1px);
        }

        .hero {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 350px;
        }

        .hero-content {
            width: 100%;
            height: 100%;
            padding: 2.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-content h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(3rem, 8vw, 5rem);
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }

        .hero-content p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1rem, 1.5vw, 1.3rem);
            color: rgba(200, 210, 215, 0.5);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 20;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: rgba(200, 210, 215, 0.4);
            text-decoration: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            color: #ffffff;
        }

        .blog-section {
            position: relative;
            z-index: 10;
            padding: 2rem 2rem 5rem 2rem;
            width: 100%;
        }

        .blog-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
            padding: 0.5rem;
        }

        .blog-card {
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .blog-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 255, 255, 0.02);
        }

        .blog-card .blog-image {
            width: 100%;
            height: 200px;
            background: #121212;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blog-card .blog-image .placeholder-icon {
            font-size: 4rem;
            opacity: 0.2;
            color: rgba(255, 255, 255, 0.15);
        }

        .blog-card .blog-image .blog-date-badge {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            padding: 0.3rem 0.8rem;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(200, 210, 215, 0.6);
        }

        .blog-card .blog-body {
            padding: 1.8rem 2rem 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-card .blog-body .blog-tag {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.2rem 0.7rem;
            background: rgba(110, 255, 224, 0.05);
            border: 1px solid rgba(110, 255, 224, 0.1);
            color: #6effe0;
            margin-bottom: 0.8rem;
            align-self: flex-start;
        }

        .blog-card .blog-body h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.3rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .blog-card .blog-body .excerpt {
            color: rgba(200, 210, 215, 0.6);
            font-size: 0.9rem;
            line-height: 1.6;
            font-weight: 300;
            flex-grow: 1;
            margin-bottom: 1rem;
        }

        .blog-card .blog-body .read-more {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            color: rgba(200, 210, 215, 0.6);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;

            border-bottom: 1px solid rgba(255, 255, 255, 0.06);

        .blog-card .blog-body .read-more:hover {

            gap: 0.8rem;
            border-bottom-color: rgba(255, 255, 255, 0.2);
        }

        .post-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

            height: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);

        .post-modal.active {

        .post-modal .modal-content {

            border: 1px solid rgba(255, 255, 255, 0.06);

            overflow-y: auto;

        .post-modal .close-modal {
            position: sticky;

            font-size: 1.5rem;
            color: rgba(200, 210, 215, 0.3);

        .post-modal .close-modal:hover {

            color: #6effe0;

        .post-modal .modal-content .post-date {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: rgba(200, 210, 215, 0.3);

        }

        .post-modal .modal-content h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .post-modal .modal-content .post-body {
            color: rgba(200, 210, 215, 0.85);
            font-size: 1rem;
            line-height: 1.8;
        }

        .post-modal .modal-content .post-body h2 {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            color: #ffffff;
            margin: 1.5rem 0 0.8rem 0;
        }

        .post-modal .modal-content .post-body h3 {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin: 1.2rem 0 0.6rem 0;
        }

        .post-modal .modal-content .post-body code {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.4rem;
            border: 1px solid rgba(255, 255, 255, 0.04);

        .post-modal .modal-content .post-body pre {

        .post-modal .modal-content .post-body pre code {

        .post-modal .modal-content .post-body ul,

            margin: 0.3rem 0;

        .post-modal .modal-content .post-body blockquote {
            border-left: 3px solid rgba(110, 255, 224, 0.2);

            color: rgba(200, 210, 215, 0.5);
            font-style: italic;

        .post-modal .modal-content .post-body a {
            color: #6effe0;
            text-decoration: none;

        }

        }

        .post-modal .modal-content .post-body strong {
            color: #ffffff;

            background: rgba(0, 0, 0, 0.5);

            align-items: center;

            letter-spacing: 0.02em;
            text-align: left;

            overflow-x: auto;

        .ascii-art-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
        }

        .footer-info {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-width: 400px;
        }

        .footer-info .info-item {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            color: rgba(200, 210, 215, 0.6);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .footer-info .info-item:last-child {
            border-bottom: none;
        }

        .footer-info .info-item .label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(200, 210, 215, 0.3);
            min-width: 80px;
        }

        .footer-info .info-item .value {
            color: rgba(220, 230, 235, 0.8);
            font-weight: 400;
        }

        .footer-info .info-item .value a {
            color: rgba(220, 230, 235, 0.8);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-info .info-item .value a:hover {
            color: #ffffff;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(200, 210, 215, 0.3);
            font-family: 'Space Mono', monospace;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(18, 18, 18, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            color: rgba(200, 210, 215, 0.4);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: rgba(200, 210, 215, 0.25);
            font-size: 0.9rem;
        }

        .empty-state code {
            font-family: 'Space Mono', monospace;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
            color: rgba(200, 210, 215, 0.3);

        @media (max-width: 700px) {
            .hero {
                height: 40vh;
                min-height: 280px;
            }
            .hero-content {
                padding: 1.8rem 1.5rem;
            }
            .back-link {
                top: 1rem;
                left: 1rem;
                font-size: 0.7rem;
            }
            .blog-grid {
                grid-template-columns: 1fr;
            }
            .blog-section {
                padding: 1rem 1.2rem 3rem;
            }
            .post-modal .modal-content {
                padding: 1.5rem;
            }
            .post-modal .modal-content h1 {

            }
            .footer-container {
                flex-direction: column;
                gap: 2rem;
                text-align: center;
            }
            .ascii-art {
                font-size: 0.7rem;
                white-space: pre-wrap;
                word-break: break-all;
            }
            .footer-info {
                max-width: 100%;
                width: 100%;
            }
            .footer-info .info-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.2rem;
            }
            .footer-info .info-item .label {
                min-width: auto;
            }
        }

        @media (max-width: 480px) {
            .hero {
                height: 35vh;
                min-height: 240px;
            }
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .blog-card .blog-image {
                height: 150px;
            }
            .post-modal {
                padding: 1rem;
            }
            .post-modal .modal-content {
                padding: 1.2rem;
            }
            .post-modal .modal-content h1 {
                font-size: 1.2rem;
            }
            .ascii-art {
                font-size: 0.6rem;
                white-space: pre-wrap;
                word-break: break-all;
            }
        }
    </style>
</head>
<body>

    <script>
        // ===== CONFIGURATION =====
        const GITHUB_USERNAME = 'wrait8';
        const GITHUB_REPO = 'wrait8.github.io';
        const POSTS_FOLDER = 'Posts';

        // ===== FETCH POSTS =====
        async function fetchPosts() {
            try {
                const listResponse = await fetch('posts.json');
                if (listResponse.ok) {
                    const postList = await listResponse.json();
                    
                    const posts = await Promise.all(
                        postList.map(async (postInfo) => {
                            try {
                                const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${POSTS_FOLDER}/${postInfo.filename}`;
                                const contentResponse = await fetch(url);
                                if (contentResponse.ok) {
                                    const content = await contentResponse.text();
                                    return parseMarkdownPost(content, postInfo.filename);
                                } else {
                                    return {
                                        ...postInfo,
                                        content: postInfo.content || `# ${postInfo.title}\n\n${postInfo.excerpt}`
                                    };
                                }
                            } catch (err) {
                                console.error(`Error fetching ${postInfo.filename}:`, err);
                                return {
                                    ...postInfo,
                                    content: postInfo.content || `# ${postInfo.title}\n\n${postInfo.excerpt}`
                                };
                            }
                        })
                    );
                    
                    return posts;
                }

                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${POSTS_FOLDER}`
                );

                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }

                const files = await response.json();
                const mdFiles = files.filter(file => file.name.endsWith('.md'));

                if (mdFiles.length === 0) {
                    return [];
                }

                const posts = await Promise.all(
                    mdFiles.map(async (file) => {
                        try {
                            const contentResponse = await fetch(file.download_url);
                            const content = await contentResponse.text();
                            return parseMarkdownPost(content, file.name);
                        } catch (err) {
                            console.error(`Error fetching ${file.name}:`, err);
                            return null;
                        }
                    })
                );

                return posts.filter(p => p !== null);

            } catch (error) {
                console.error('Error fetching posts:', error);
                return [];
            }
        }

        // ===== PARSE MARKDOWN POST =====
        function parseMarkdownPost(content, filename) {
            // Remove frontmatter (the --- delimited section at the start)
            let cleanContent = content;
            let frontmatter = {};
            
            // Check if content has frontmatter
            const frontmatterMatch = content.match(/^---\s*\n([\s\S]*?)\n---\s*\n/);
            if (frontmatterMatch) {
                // Parse frontmatter
                const fmLines = frontmatterMatch[1].split('\n');
                for (const line of fmLines) {
                    const [key, ...valueParts] = line.split(':');
                    if (key && valueParts.length > 0) {
                        frontmatter[key.trim()] = valueParts.join(':').trim();
                    }
                }
                // Remove frontmatter from content
                cleanContent = content.replace(/^---\s*\n[\s\S]*?\n---\s*\n/, '');
            }

            const titleMatch = cleanContent.match(/^#\s+(.+)$/m);
            const title = titleMatch ? titleMatch[1] : filename.replace('.md', '');

            let date = new Date().toISOString().split('T')[0];
            if (frontmatter.date) {
                date = frontmatter.date;
            } else {
                const fileDateMatch = filename.match(/^(\d{4}-\d{2}-\d{2})/);
                if (fileDateMatch) {
                    date = fileDateMatch[1];
                }
            }

            let tag = 'General';
            if (frontmatter.tags) {
                tag = frontmatter.tags;
            } else if (frontmatter.tag) {
                tag = frontmatter.tag;
            }

            let excerpt = '';
            const lines = cleanContent.split('\n');
            let foundTitle = false;
            for (const line of lines) {
                if (line.startsWith('# ')) {
                    foundTitle = true;
                    continue;
                }
                if (foundTitle && line.trim() && !line.startsWith('---')) {
                    excerpt = line.trim();
                    break;
                }
            }
            if (!excerpt) {
                excerpt = cleanContent.substring(0, 200).replace(/#/g, '').trim() + '...';
            }

            let icon = '📄';
            if (frontmatter.icon) {
                icon = frontmatter.icon;
            }

            const displayDate = formatDate(date);

            return {
                title,
                tag,
                excerpt,
                content: cleanContent,
                icon,
                date: date,
                displayDate,
                filename
            };
        }

        function formatDate(dateStr) {
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });
            } catch {
                return dateStr;
            }
        }

        function renderPosts(posts) {
            const grid = document.getElementById('blogGrid');

            if (posts.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <h3>No posts yet</h3>
                        <p>Add <code>.md</code> files to the <code>${POSTS_FOLDER}/</code> folder.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = posts.map(post => `
                <div class="blog-card" onclick="openPost(${JSON.stringify(post).replace(/"/g, '&quot;')})">
                    <div class="blog-image">
                        <span class="placeholder-icon">${post.icon || '📄'}</span>
                        <span class="blog-date-badge">${post.displayDate}</span>
                    </div>
                    <div class="blog-body">
                        <span class="blog-tag">${post.tag}</span>
                        <h3>${post.title}</h3>
                        <div class="excerpt">${post.excerpt}</div>
                        <span class="read-more">Read More →</span>
                    </div>
                </div>
            `).join('');
        }

        function openPost(post) {
            const modal = document.getElementById('postModal');
            const content = document.getElementById('postContent');

            const renderedContent = marked.parse(post.content);

            content.innerHTML = `
                <span class="post-tag">${post.tag}</span>
                <div class="post-date">${post.displayDate}</div>
                <h1>${post.title}</h1>
                <div class="post-body">${renderedContent}</div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('postModal').classList.remove('active');
            document.body.style.overflow = '';
        });

        document.getElementById('postModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        async function init() {
            try {
                const posts = await fetchPosts();
                renderPosts(posts);
                console.log(`✅ Loaded ${posts.length} posts`);
            } catch (error) {
                console.error('Error loading posts:', error);
                renderPosts([]);
            }
        }

        init();
        console.log('📁 WRAITH Blog loaded successfully');
    </script>
</body>
</html>
